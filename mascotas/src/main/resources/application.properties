spring.application.name=mascotas

# Conexión principal usando las variables de entorno de Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Mostrar consultas SQL en la consola (útil para el examen)
spring.jpa.show-sql=true

# Hibernate configurado para actualizar la base de datos automáticamente
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto dinámico de Render
server.port=${PORT:8080}
