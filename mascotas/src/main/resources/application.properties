spring.application.name=mascotas

# Render nos da una variable llamada DATABASE_URL.
# Si no existe (en tu PC), usará el localhost por defecto.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mascotas-data-base}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

# Mostrar consultas SQL
spring.jpa.show-sql=true

# Configuración del esquema
spring.jpa.hibernate.ddl-auto=update

# Dialecto para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Esto es vital para Render: permite que el servidor use el puerto que le asigne la nube
server.port=${PORT:8080}